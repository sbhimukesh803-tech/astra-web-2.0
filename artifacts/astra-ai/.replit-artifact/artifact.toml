kind = "web"
previewPath = "/"
title = "ASTRA.AI"
version = "1.0.0"
id = "artifacts/astra-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24264

[services.development]
run = "pnpm --filter @workspace/astra-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/astra-ai", "run", "build" ]
publicDir = "artifacts/astra-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24264"
BASE_PATH = "/"
